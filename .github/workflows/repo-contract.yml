name: repo-contract

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-repo-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check documentation contract
        run: python scripts/check_repo_contract.py
