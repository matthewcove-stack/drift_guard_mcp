name: lambic-drift-guard

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-edge-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint deps
        run: python -m pip install pyyaml
      - name: Run Lambic drift guard
        run: python scripts/lint_edge_contract.py
